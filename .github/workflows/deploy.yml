name: Deploy to Render

on:
  push:
    branches: [main]

permissions:
  deployments: write

jobs:
  deploy:
    name: Production Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub deployment
        id: create_deploy
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              required_contexts: [],
              auto_merge: false,
              description: 'Deploying to Render',
            });
            return String(data.id);

      - name: Set deployment in progress
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.create_deploy.outputs.result }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'in_progress',
              environment_url: 'https://consolidated-echoecho.onrender.com',
              log_url: 'https://dashboard.render.com',
              description: 'Build running on Render...',
            });

      - name: Wait for Render build to finish
        run: sleep 150

      - name: Mark deployment successful
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.create_deploy.outputs.result }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'success',
              environment_url: 'https://consolidated-echoecho.onrender.com',
              log_url: 'https://dashboard.render.com',
              description: 'Live at consolidated-echoecho.onrender.com',
            });
